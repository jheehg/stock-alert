name: Daily Stock Alert

on:
  schedule:
    - cron: '30 7 * * 1-5'  # UTC 07:30 = KST 16:30, 평일만
  workflow_dispatch:  # 수동 실행 가능

jobs:
  alert:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write holdings.json from secret
        env:
          HOLDINGS_JSON: ${{ secrets.HOLDINGS_JSON }}
        run: |
          if [ -n "$HOLDINGS_JSON" ]; then
            printf '%s' "$HOLDINGS_JSON" > holdings.json
            echo "holdings.json written ($(wc -c < holdings.json) bytes)"
          else
            echo "HOLDINGS_JSON secret is empty — skipping"
          fi

      - name: Run stock alert
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py
